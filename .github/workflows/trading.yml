name: Trading Bot
on:
  schedule:
    - cron: '45 3 * * 1-5'
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install smartapi-python pyotp pandas numpy
      - run: python bot.py
        timeout-minutes: 370
