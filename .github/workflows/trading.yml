name: Trading Bot

on:
  schedule:
    - cron: '45 3 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install smartapi-python pyotp logzero pandas requests websocket-client

      - name: Run bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        run: python bot.py
