name: Trading Bot

on:
  schedule:
    - cron: '45 3 * * 1-5'   # 9:15 AM IST - Market open
    - cron: '*/15 4-9 * * 1-5'  # എല്ലാ 15 മിനിറ്റിലും
    - cron: '0 10 * * 1-5'   # 3:30 PM IST - Market close
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3 → v4 (warning fix)

      - name: Setup Python
        uses: actions/setup-python@v5  # v4 → v5 (warning fix)
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install smartapi-python pyotp logzero pandas requests websocket-client

      - name: Run bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        run: python bot.py
